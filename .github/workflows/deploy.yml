name: Deploy Love2D to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone 2dengine/love.js player
        run: git clone https://github.com/2dengine/love.js.git lovejs-player

      - name: Package game as .love file
        run: |
          cd $GITHUB_WORKSPACE
          zip -r game.love . -x "*.git*" -x "dist/*" -x "lovejs-player/*" -x "*.love"

      - name: Prepare deployment directory
        run: |
          mkdir -p dist
          # Copy love.js player files
          cp lovejs-player/player.js dist/
          cp lovejs-player/style.css dist/
          cp lovejs-player/nogame.love dist/
          cp -r lovejs-player/11.5 dist/11.5
          cp -r lovejs-player/lua dist/lua
          # Copy our game
          ZIP_NAME="game_${GITHUB_SHA::7}.love"
          cp game.love dist/$ZIP_NAME
          # Copy service worker for COOP/COEP headers
          cp coi-serviceworker.js dist/coi-serviceworker.js
          # Create index.html
          cat > dist/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
            <title>Tower Defense Mobile</title>
            <script src="coi-serviceworker.js"></script>
            <link rel="stylesheet" href="style.css">
            <style>
              body, html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background-color: #000;
                overflow: hidden;
                touch-action: none; /* 모바일에서 자동 확대 방지 */
              }
              #canvas {
                width: 100vw !important;
                height: 100vh !important;
                max-width: 100vw !important;
                max-height: 100vh !important;
                object-fit: contain !important;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                touch-action: none;
              }
            </style>
          </head>
          <body>
            <script src="player.js?g=${ZIP_NAME}&v=11.5"></script>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
